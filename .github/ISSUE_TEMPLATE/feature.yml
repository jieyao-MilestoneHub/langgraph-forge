name: Feature request
description: Propose a new capability or an improvement to an existing one.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, scan the README's "Not included -- by design" section.
        Several scopes (HTTP API, auth, tracing, prompt registry) are
        permanently out of scope; proposals there will be closed.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you unable to do, or what is friction-laden, today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        A sketch of the API / CLI / behaviour you have in mind.
        Pseudocode is welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other libraries, upstream features, or workarounds you have tried.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require adding an HTTP API, auth, or UI.
          required: true
        - label: This does not duplicate functionality already in LangGraph / LangChain.
          required: true
