name: Bug report
description: Something broke that was working, or a clear spec violation.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Fill in the fields below;
        anything you leave blank we will likely ask you about anyway.

  - type: input
    id: version
    attributes:
      label: langgraph-forge version
      description: "Output of `python -c \"import langgraph_forge; print(langgraph_forge.__version__)\"`"
      placeholder: "0.1.0a1"
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
        - other (note in description)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Minimum steps or code snippet. If it involves the CLI, paste the
        exact command. If it involves the library API, a ~10 line snippet
        is ideal.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full traceback if any.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reproduced the issue with the latest released version.
          required: false
